name: Build & Release Password Generator APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: "${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASSWORD: "${{ secrets.KEY_PASSWORD }}"
        run: ./gradlew assembleRelease

      - name: Rename APKs
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk Password-Generator-debug.apk
          cp app/build/outputs/apk/release/app-release.apk Password-Generator.apk
          ls -lh Password-Generator*.apk

      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Password-Generator-debug
          path: Password-Generator-debug.apk

      - name: Upload release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Password-Generator
          path: Password-Generator.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ github.run_number }}"
          TAG="pwgen-$VERSION"
          echo "Creating release $TAG"
          gh release create "$TAG" \
            --title "Password Generator $VERSION" \
            --notes "Password Generator $VERSION
          - Debug: Password-Generator-debug.apk
          - Release (signed): Password-Generator.apk

          Features: Password generator, passphrase generator, strength checker
          Target devices: Samsung S7, S8, Pixel 6, Pixel 7 (minSdk 24)" \
            Password-Generator-debug.apk Password-Generator.apk || \
          gh release upload "$TAG" Password-Generator-debug.apk Password-Generator.apk --clobber
