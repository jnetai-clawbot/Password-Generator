    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252542;
            --accent-primary: #00d4ff;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --glow-primary: 0 0 20px rgba(0, 212, 255, 0.3);
            --glow-secondary: 0 0 20px rgba(124, 58, 237, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(124, 58, 237, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: var(--glow-primary);
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        .status-box {
            min-height: 50px;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(-10px);
        }

        .status-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .status-box.success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .status-box.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .status-box.info {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--accent-primary);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            width: 80px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: var(--glow-primary);
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px 20px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.3s ease;
            background-image: linear-gradient(var(--bg-card), var(--bg-card)), var(--accent-gradient);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        input[type="text"]:focus {
            outline: none;
            box-shadow: var(--glow-primary);
        }

        input[type="text"]::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            padding: 12px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: var(--glow-primary);
        }

        button.primary {
            background: var(--accent-gradient);
            border: none;
        }

        button.primary:hover {
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .strength-indicator {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .strength-indicator.strong {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .strength-indicator.weak {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .divider {
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 1px;
            margin: 40px 0;
            opacity: 0.3;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--bg-card);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            border-color: var(--accent-primary);
            box-shadow: var(--glow-primary);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .generating {
            animation: pulse 1s ease-in-out infinite;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
            input[type="text"] { font-size: 0.95rem; }
            button { padding: 10px 18px; font-size: 0.9rem; }
        }
    </style>
</head>

    // Status message functions - separated for each section
    function showPasswordStatus(message, type = 'info') {
        const statusEl = document.getElementById('passwordStatus');
        statusEl.textContent = message;
        statusEl.className = `status-box ${type} visible`;
        setTimeout(() => {
            statusEl.classList.remove('visible');
        }, 3000);
    }

    function showPassphraseStatus(message, type = 'info') {
        const statusEl = document.getElementById('passphraseStatus');
        statusEl.textContent = message;
        statusEl.className = `status-box ${type} visible`;
        setTimeout(() => {
            statusEl.classList.remove('visible');

    // Password Generation
    function generatePassword() {
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.classList.add('generating');
        
        const length = parseInt(document.getElementById("passwordLength").value) || 12;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let password = "";

        let hasNumber = false;
        let hasSpecialChar = false;

        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * charset.length);
            const char = charset.charAt(randomIndex);

            if (/\d/.test(char)) hasNumber = true;
            else if (/[\W_]/.test(char)) hasSpecialChar = true;

            password += char;
        }

        if (!hasNumber) {
            const randomIndex = Math.floor(Math.random() * length);
            password = password.substring(0, randomIndex) + Math.floor(Math.random() * 10) + password.substring(randomIndex + 1);
        }
        if (!hasSpecialChar) {
            const randomIndex = Math.floor(Math.random() * length);
            const randomSpecialChar = "!@#$%^&*()_+";
            const randomChar = randomSpecialChar.charAt(Math.floor(Math.random() * randomSpecialChar.length));
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
        }

        passwordInput.value = password;
        passwordInput.classList.remove('generating');
        checkPasswordStrength(password, 'passwordStrength');
    }

    function generatePassphrase() {
        const passphraseInput = document.getElementById('passphraseInput');
        passphraseInput.classList.add('generating');
        
        const numWords = parseInt(document.getElementById("numWords").value) || 4;
        let passphrase = [];

        for (let i = 0; i < numWords; i++) {
            const randomIndex = Math.floor(Math.random() * wordList.length);
            passphrase.push(wordList[randomIndex]);
        }

        const result = passphrase.join("-");
        passphraseInput.value = result;
        passphraseInput.classList.remove('generating');
        checkPassphraseStrength(result, 'passphraseStrength');
    }

    function addNumbers() {
        let passphrase = document.getElementById("passphraseInput").value;
        if (!passphrase) {
            showPassphraseStatus("Generate a passphrase first!", "error");
            return;
        }
        const numbers = "0123456789";
        for (let i = 0; i < 3; i++) {
            const randomIndex = Math.floor(Math.random() * (passphrase.length + 1));
            const randomNumber = numbers.charAt(Math.floor(Math.random() * numbers.length));
            passphrase = passphrase.substring(0, randomIndex) + randomNumber + passphrase.substring(randomIndex);
        }
        document.getElementById("passphraseInput").value = passphrase;
        checkPassphraseStrength(passphrase, 'passphraseStrength');
        showPassphraseStatus("Numbers added! 🎲", "success");
    }

    function makeUppercase() {
        let passphrase = document.getElementById("passphraseInput").value;
        if (!passphrase) {
            showPassphraseStatus("Generate a passphrase first!", "error");
            return;
        }
        for (let i = 0; i < 3; i++) {
            const randomIndex = Math.floor(Math.random() * passphrase.length);
            passphrase = passphrase.substring(0, randomIndex) + passphrase.charAt(randomIndex).toUpperCase() + passphrase.substring(randomIndex + 1);
        }
        document.getElementById("passphraseInput").value = passphrase;
        checkPassphraseStrength(passphrase, 'passphraseStrength');
        showPassphraseStatus("Letters uppercased! 🔠", "success");
    }

    function addSpecialChars() {
        let passphrase = document.getElementById("passphraseInput").value;
        if (!passphrase) {
            showPassphraseStatus("Generate a passphrase first!", "error");
            return;
        }
        const specialChars = "!@#$%^&*()_+";
        for (let i = 0; i < 3; i++) {
            const randomIndex = Math.floor(Math.random() * (passphrase.length + 1));
            const randomChar = specialChars.charAt(Math.floor(Math.random() * specialChars.length));
            passphrase = passphrase.substring(0, randomIndex) + randomChar + passphrase.substring(randomIndex);
        }
        document.getElementById("passphraseInput").value = passphrase;
        checkPassphraseStrength(passphrase, 'passphraseStrength');
        showPassphraseStatus("Special chars added! ✨", "success");
    }

    function checkPasswordStrength(value, elementId) {
        const strengthElement = document.getElementById(elementId);
        const hasNumber = /\d/.test(value);
        const hasUppercase = /[A-Z]/.test(value);
        const hasSpecialChar = /[!@#$%^&*()_+]/.test(value);
        
        if (value.length >= 8 && hasNumber && hasUppercase && hasSpecialChar) {
            strengthElement.innerText = "🛡️ Strong";
            strengthElement.className = "strength-indicator strong";
        } else {
            strengthElement.innerText = "⚠️ Weak";
            strengthElement.className = "strength-indicator weak";
        }
    }

    function checkPassphraseStrength(value, elementId) {
        const strengthElement = document.getElementById(elementId);
        const length = value.length;
        const wordCount = value.split('-').length;
        const hasNumber = /\d/.test(value);
        const hasUppercase = /[A-Z]/.test(value);
        const hasSpecialChar = /[!@#$%^&*()_+]/.test(value);
        
        let score = 0;
        if (wordCount >= 4) score++;
        if (wordCount >= 6) score++;
        if (hasNumber) score++;
        if (hasUppercase) score++;
        if (hasSpecialChar) score++;
        
        if (score >= 4) {
            strengthElement.innerText = "🛡️ Strong";
            strengthElement.className = "strength-indicator strong";
        } else if (score >= 2) {
            strengthElement.innerText = "⚡ Medium";
            strengthElement.className = "strength-indicator weak";
        } else {
            strengthElement.innerText = "⚠️ Weak";
            strengthElement.className = "strength-indicator weak";
        }
    }

    function copyPasswordToClipboard() {
        const passwordInput = document.getElementById("passwordInput");
        if (!passwordInput.value) {
            showPasswordStatus("Generate a password first!", "error");
            return;
        }
        passwordInput.select();
        document.execCommand("copy");
        showPasswordStatus("✓ Password copied to clipboard!", "success");
    }

    function copyPassphraseToClipboard() {
        const passphraseInput = document.getElementById("passphraseInput");
        if (!passphraseInput.value) {
            showPassphraseStatus("Generate a passphrase first!", "error");
            return;
        }
        passphraseInput.select();
        document.execCommand("copy");
        showPassphraseStatus("✓ Passphrase copied to clipboard!", "success");
